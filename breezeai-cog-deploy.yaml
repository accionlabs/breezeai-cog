apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${MICROSERVICE_NAME}
  labels:
    app: ${MICROSERVICE_NAME}
    com.breeze.project: Breeze
spec:
  replicas: ${REPLICAS}
  selector:
    matchLabels:
      app: ${MICROSERVICE_NAME}
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ${MICROSERVICE_NAME}
    spec:
      # Kubernetes injects legacy Docker-link env vars for every Service in the
      # namespace. For the Service named `breezeai-cog` it generates
      # BREEZEAI_COG_PORT=tcp://<clusterIP>:3000, which collides with the app's
      # BREEZEAI_COG_ env prefix (Settings.port reads BREEZEAI_COG_PORT). Disable
      # service links so that injected var never shadows real config.
      enableServiceLinks: false
      initContainers:
        - name: fix-logs-perms
          image: busybox:1.36
          command:
            - sh
            - -c
            - chown -R 1000:1000 /logs && chmod -R u+rwX,g+rwX /logs
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: logs
              mountPath: /logs
      containers:
        - name: ${MICROSERVICE_NAME}
          image: ${AWS_ACCOUNT_NUMBER}.dkr.ecr.${REGION}.amazonaws.com/${CLIENT_NAME}/${ENV}/${MICROSERVICE_NAME}:${TAG}
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: ${MICROSERVICE_NAME}
            - secretRef:
                name: ${SECRET}
          resources:
            requests:
              cpu: ${MIN_CPU}
              memory: ${MIN_MEM}
            limits:
              cpu: ${MAX_CPU}
              memory: ${MAX_MEM}
          ports:
            - name: http
              containerPort: 3000
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /logs
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: ${MICROSERVICES_PVC}
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: ${MICROSERVICE_NAME}
  labels:
    app: ${MICROSERVICE_NAME}
  annotations:
    com.breeze.env: development
    com.breeze.project: Breeze
spec:
  type: ClusterIP
  selector:
    app: ${MICROSERVICE_NAME}
  ports:
    - name: http
      port: 3000
      targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${MICROSERVICE_NAME}-ing
  namespace: ${NAMESPACE}
  annotations:
    konghq.com/plugins: cors
    konghq.com/strip-path: "true"
    plugins.konghq.com: jwt, cors
spec:
  ingressClassName: kong
  rules:
    - host: ${ENVIRONMENT_URL}
      http:
        paths:
          - path: ${ENV_CONTEXT_PATH}
            pathType: ImplementationSpecific
            backend:
              service:
                name: ${MICROSERVICE_NAME}
                port:
                  number: 3000
